<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Finding a job? Findy-Job is the best choice. We offer a large number of specialties, join us!">
    <title>Findy-Job</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'resume/style.css' %}?v=1">

</head>

<body>

<header>
    <h1>Findy-Job</h1>

    <nav>
        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <a href="{% url 'logout_view' %}">Logout</a>
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'cart_detail' %}">Saved</a>
            <a href="{% url 'create_resume' %}">Create Resume</a>
            
        {% else %}
            <a href="{% url 'login_view' %}">Login</a>
            <a href="{% url 'register_view' %}">Register</a>
        {% endif %}
    </nav>

    <div class="search-container">
        <form method="GET" action="{% url 'index' %}">
            <input type="text" name="q" placeholder="Search resume...">
        </form>
    </div>
</header>

<main>
    <div class="container">

        {% block content %}
        <div class="resume-card">
            <img src="https://via.placeholder.com/150">

            <div class="resume-info">
                <h3>John Doe</h3>
                <p>Frontend Developer</p>

                <div class="actions">
                    <a href="#">View</a>
                    <a href="#">Edit</a>
                    <a href="#">Delete</a>
                </div>
            </div>
        </div>

        {% endblock %}

    </div>
</main>

<footer>
    &copy; 2025 Findy-Job
</footer>

</body>
</html>
