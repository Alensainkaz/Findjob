<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="Finding a job? Findy-Job is the best choice. We offer large number of Specialities, join us!">
    <title>Findy-Job</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Display:wght@300..800&family=Major+Mono+Display&family=Metal+Mania&family=Monoton&family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ms+Madi&display=swap" rel="stylesheet">
    <style>
    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background: #f2f2f5;
        color: #222;
        line-height: 1.6;
        transition: background 0.3s ease;
    }

    header {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(18px);
        padding: 25px 60px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        border-bottom: 1px solid rgba(0,0,0,0.05);
        transition: all 0.3s ease;
    }

    header h1 {
        margin: 0;
        font-size: 3rem;
        color: #333;
        text-shadow: 0 0 8px rgba(0,0,0,0.05);
    }

    nav a {
    font-weight: 600;
    font-size: 1.2rem;
    text-decoration: none;
    color: #333;
    position: relative;
    transition: color 0.3s ease, transform 0.3s ease;
}

    nav a::after {
    content: '';
    position: absolute;
    width: 0;
    height: 2px;
    bottom: -4px;
    left: 0;
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    transition: width 0.4s ease;
    border-radius: 1px;
}

    nav a:hover {
    color: #ff7e5f;
    transform: translateY(-2px);
}

    nav a:hover::after {
    width: 100%;
}
    span {
        font-weight: 500;
        font-size: 1.1rem;
        color: #555;
        margin-right: 10px;
    }

    .search-container {
        margin-top: 20px;
        width: 100%;
        display: flex;
        justify-content: flex-start;
    }

    .search-container input[type="text"] {
        width: 340px;
        padding: 14px 20px;
        font-size: 1rem;
        border-radius: 25px;
        border: none;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(14px);
        color: #222;
        outline: none;
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        transition: all 0.35s ease;
    }

    .search-container input[type="text"]::placeholder {
        color: #999;
        font-weight: 500;
    }

    .search-container input[type="text"]:focus {
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        transform: scale(1.02);
    }

    main {
        padding: 60px;
        min-height: calc(100vh - 200px);
    }

    footer {
        text-align: center;
        padding: 25px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(14px);
        color: #777;
        font-size: 0.95rem;
        border-top: 1px solid rgba(0,0,0,0.05);
    }

    img {
        width: 400px;
        height: 350px;
        border-radius: 50px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    img:hover {
        transform: scale(1.03);
        box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }
    .log-box {
        display: flex;
        gap:15px;
    }
    .links-box {
        display: flex;
        gap: 15px;
    }
    a {
        text-decoration: none;
        font-size: 20px;
    }
    @media screen and (max-width:480px){
        
    }
</style>
</head>
<body>
    <header>
        <h1>Findy-Job</h1>
        <nav>
            {% if user.is_authenticated %}
                <span>Hello, {{ user.username }}</span>
                <div class="links-box">
                    <a href="{% url 'logout_view' %}">Logout</a>
                    <a href="{% url 'index' %}">Main Page</a>
                    <a href="{% url 'cart_detail' %}">List</a>
                </div>
            {% else %}
                <div class="log-box">
                    <a href="{% url 'login_view' %}">Login</a>
                    <a href="{% url 'register_view' %}">Register</a>
                </div>
            {% endif %}
        </nav>

        <div class="search-container">
            <form method="GET" action="{% url 'index' %}">
                <input type="text" name="q" placeholder="Search resume...">
            </form>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

    <footer>
        &copy; 2025 Findy Job
    </footer>
</body>
</html>
