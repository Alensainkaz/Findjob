<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Finding a job? Findy-Job is the best choice. We offer a large number of specialties, join us!">
    <title>Findy-Job</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="icon" type="image/svg+xml" href="{% static 'favicon-16x16.png' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon-512.png' %}">
    <link rel="stylesheet" href="{% static 'resume/style.css' %}?v=1">
    <style>
    * {
    box-sizing:border-box;
    margin: 0;
    padding: 0;
    font-size: 'Montserrat',sans-serif;
    }
    body {
        margin: 0;
        font-family: 'Montserrat', sans-serif;
        background: #f4f5f7;
        color: #222;
    }
    .links-resume {
        display: flex;
        flex-direction: column;
        gap: 8px 20px;
    }
    .block {
        display: flex;
        gap:20px;
        flex-direction: row;
        justify-content: flex-start;
    }

    header {
        position: sticky;
        top: 0;
        z-index: 999;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 60px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(15px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    header h1 {
        margin: 0;
        font-size: 2rem;
    }
    img {
        width: 300px;
        height: 250px;
    }
    nav {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    nav a {
        text-decoration: none;
        color: #333;
        font-weight: 600;
        position: relative;
    }

    nav a:hover {
        color: #6366f1;
    }

    span {
        color: #555;
    }

    .search-container input {
        padding: 10px 15px;
        border-radius: 20px;
        border: none;
        outline: none;
        background: #fff;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    main {
        padding: 40px 20px;
    }

    .container {
        max-width: 1000px;
        margin: 0 auto;
    }


    .resume-card {
        display: flex;
        gap: 25px;
        align-items: center;
        background: #fff;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        margin-bottom: 25px;
        transition: 0.3s;
    }

    .resume-card:hover {
        transform: translateY(-5px);
    }

    .resume-card img {
        max-width: 250px;
        height: 250px;
        object-fit: cover;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .resume-info h3 {
        margin: 0;
        font-size: 1.5rem;
        color: #111;
    }

    .resume-info p {
        margin: 5px 0 10px;
        color: #555;
        font-size: 1rem;
    }

    .actions {
        margin-top: 10px;
    }

    .actions a {
        margin-right: 10px;
        padding: 8px 16px;
        border-radius: 10px;
        text-decoration: none;
        font-size: 14px;
        color: white;
        transition: 0.3s;
    }
    button {
        border-radius: 60px;
        background-color:#000000;
        color: #fff;
        padding: 10px 25px;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        background-color: #10b981;
        color: #222;
    }
    button:active {
        background-color: #0cffae;
        color: #222;
    }


    footer {
        text-align: center;
        padding: 20px;
        color: #777;
    }
    .name {
        display: flex;
        gap: 7px;
    }

    @media (max-width: 768px) {
        header {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding: 20px;
        }

        .resume-card {
            flex-direction: column;
            align-items: flex-start;
        }

        .resume-card img {
            width: 100%;
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
        }

        .resume-info h3 {
            font-size: 1.3rem;
        }

        .resume-info p {
            font-size: 0.95rem;
        }
    }
    </style>
</head>

<body>

<header>
    <h1>Findy-Job</h1>

    <nav>
        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <a href="{% url 'logout_view' %}">Logout</a>
            <a href="{% url 'index' %}">Home</a>
            <a href="{% url 'cart_detail' %}">Saved</a>
            <a href="{% url 'create_resume' %}">Create Resume</a>
            
        {% else %}
            <a href="{% url 'login_view' %}">Login</a>
            <a href="{% url 'register_view' %}">Register</a>
        {% endif %}
    </nav>

    <div class="search-container">
        <form method="GET" action="{% url 'index' %}">
            <input type="text" name="q" placeholder="Search resume...">
        </form>
    </div>
</header>

<main>
    <div class="container">

        {% block content %}
        <div class="resume-card">
            <img src="https://via.placeholder.com/150">

            <div class="resume-info">
                <h3>John Doe</h3>
                <p>Frontend Developer</p>

                <div class="actions">
                    <a href="#">View</a>
                    <a href="#">Edit</a>
                    <a href="#">Delete</a>
                </div>
            </div>
        </div>

        {% endblock %}

    </div>
</main>

<footer>
    &copy; 2025 Findy-Job
</footer>

</body>
</html>
