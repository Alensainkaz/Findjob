{% extends 'resume/base.html' %}
{% block content %}

<h2 style="margin-bottom:20px;">Add Resume</h2>

<div style="background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:28px;max-width:520px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px;">
            <label style="font-size:0.85rem;font-weight:600;color:#555;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <span style="color:#c00;font-size:0.8rem;">{{ field.errors|join:", " }}</span>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" style="margin-top:6px;">Add resume</button>
    </form>
</div>

{% endblock content %}
