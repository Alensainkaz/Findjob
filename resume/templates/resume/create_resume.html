{% extends 'resume/base.html' %}
{% block content %}

<h2 style="margin-bottom:20px;">Add Resume</h2>

<div style="background:#16253A;border:1px solid #e8e8e8;border-radius:10px;padding:28px;max-width:520px;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div style="background:#16253A;border:1px solid rgba(45,232,176,0.2);border-radius:10px;padding:28px;max-width:520px;">
            <label style="font-size:0.85rem;font-weight:600;color:#555;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <span style="color:#c00;font-size:0.8rem;">{{ field.errors|join:", " }}</span>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" style="background: linear-gradient(90deg, #2DE8B0, #0EB8F5);color: #0D1B2A;border: none;">Add resume</button>
    </form>
</div>

{% endblock content %}
